name: Prodify CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-secret-key-at-least-32-characters-long
      DATABASE_URL: sqlite:///./ci.db
      CORS_ORIGINS: '["http://localhost:8081"]'
      RATE_LIMIT_AUTH_LOGIN: "1000/minute"
      RATE_LIMIT_AUTH_REGISTER: "1000/minute"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install security tooling
        run: pip install pip-audit

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Smoke test app import
        run: python -c "from app.main import app; print(app.title)"

      - name: Compile Python sources
        run: python -m compileall -q app

      - name: Run backend tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml -q

      - name: Python dependency vulnerability scan
        run: pip-audit -r requirements.txt

  backend-postgres:
    name: Backend checks (Postgres parity)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prodify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d prodify_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-secret-key-at-least-32-characters-long
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/prodify_test
      CORS_ORIGINS: '["http://localhost:8081"]'
      RATE_LIMIT_AUTH_LOGIN: "1000/minute"
      RATE_LIMIT_AUTH_REGISTER: "1000/minute"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Run backend tests (Postgres)
        run: pytest -q

  mobile:
    name: Mobile checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Validate production public env defaults
        run: >
          node -e "const fs=require('fs');
          const eas=JSON.parse(fs.readFileSync('eas.json','utf8'));
          const env=eas?.build?.production?.env||{};
          const required=['EXPO_PUBLIC_APP_ENV','EXPO_PUBLIC_ENV','EXPO_PUBLIC_API_URL','EXPO_PUBLIC_SENTRY_DSN'];
          const missing=required.filter((k)=>!String(env[k]||'').trim());
          if(missing.length){console.error('Missing production env values in eas.json: '+missing.join(', '));process.exit(1);}
          console.log('Production env defaults configured in eas.json.');"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --ci --coverage=false

      - name: npm production dependency audit
        run: npm audit --omit=dev --audit-level=high
