name: agent-device iOS QA

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: API base URL for seed + app build
        required: false
        default: https://prodify-api-46b1.onrender.com
      test_email:
        description: E2E login email
        required: false
        default: test@prodify.app
      test_password:
        description: E2E login password
        required: false
        default: Test1234!
      test_username:
        description: E2E register username
        required: false
        default: e2euser
      maestro_flow:
        description: Maestro flow path (relative to mobile/)
        required: false
        default: maestro/flows/smoke_test.yaml
        type: choice
        options:
          - maestro/flows/bootstrap_dashboard.yaml
          - maestro/flows/smoke_test.yaml
          - maestro/flows/full_app_test.yaml
      qa_mode:
        description: Build a fresh simulator app or replay Maestro against a previous app artifact
        required: false
        default: build-and-test
        type: choice
        options:
          - build-and-test
          - replay-only
      app_artifact_run_id:
        description: Previous workflow run ID containing the ios-simulator-app artifact (required for replay-only)
        required: false
      seed_api_user:
        description: Seed the E2E API user inside CI
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: agent-device-ios-${{ github.ref }}-${{ github.event.inputs.qa_mode || 'build-and-test' }}
  cancel-in-progress: true

jobs:
  agent-device-ios:
    runs-on: macos-15
    timeout-minutes: ${{ github.event.inputs.qa_mode == 'replay-only' && 15 || 45 }}
    env:
      MAESTRO_VERSION: "1.39.13"
      MAESTRO_INSTALLER_SHA256: "40115b628eb491f29d02275bc7e3db5334024ba4fdff7210a334fd3cf4a8f306"
      E2E_API_URL: ${{ github.event.inputs.api_url || 'https://prodify-api-46b1.onrender.com' }}
      E2E_TEST_EMAIL: ${{ github.event.inputs.test_email || 'test@prodify.app' }}
      E2E_TEST_PASSWORD: ${{ github.event.inputs.test_password || 'Test1234!' }}
      E2E_TEST_USERNAME: ${{ github.event.inputs.test_username || 'e2euser' }}
      EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || 'https://prodify-api-46b1.onrender.com' }}
      EXPO_PUBLIC_APP_ENV: development
      EXPO_PUBLIC_ENV: development
      EXPO_PUBLIC_E2E_MODE: "true"
      EXPO_PUBLIC_REVENUECAT_API_KEY: appl_mnYqBJcSBBUEyNRCfULPzxMqpmX
      EXPO_PUBLIC_REVENUECAT_ENTITLEMENT_ID: app_access
      EX_UPDATES_NATIVE_DEBUG: "1"
      SENTRY_DISABLE_AUTO_UPLOAD: "true"
      SENTRY_ALLOW_FAILURE: "true"
      CI: "true"
      MAESTRO_FLOW: ${{ github.event.inputs.maestro_flow || 'maestro/flows/smoke_test.yaml' }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Node
        if: ${{ github.event.inputs.qa_mode != 'replay-only' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Seed E2E API user
        if: ${{ github.event.inputs.seed_api_user != 'false' }}
        run: bash scripts/seed-e2e-user.sh

      - name: Install mobile dependencies
        if: ${{ github.event.inputs.qa_mode != 'replay-only' }}
        run: cd mobile && npm ci

      - name: Configure fast standalone iOS QA build
        if: ${{ github.event.inputs.qa_mode != 'replay-only' }}
        working-directory: mobile
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const path = "package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          pkg.expo = pkg.expo || {};
          pkg.expo.autolinking = pkg.expo.autolinking || {};
          pkg.expo.autolinking.ios = pkg.expo.autolinking.ios || {};
          pkg.expo.autolinking.ios.exclude = [
            "expo-dev-client",
            "expo-dev-launcher",
            "expo-dev-menu",
            "expo-dev-menu-interface"
          ];
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          NODE

      - name: Prebuild iOS
        if: ${{ github.event.inputs.qa_mode != 'replay-only' }}
        working-directory: mobile
        run: npx expo prebuild --platform ios --clean

      - name: Force bundled JS for Debug simulator build
        if: ${{ github.event.inputs.qa_mode != 'replay-only' }}
        working-directory: mobile
        run: |
          set -euo pipefail
          sed -i '' 's/SKIP_BUNDLING/FORCE_BUNDLING/g' ios/Prodify.xcodeproj/project.pbxproj

      - name: Cache CocoaPods
        if: ${{ github.event.inputs.qa_mode != 'replay-only' }}
        uses: actions/cache@1bd1e96a3ec124d8856201765433a65c7bfa37e8
        id: pods-cache
        with:
          path: mobile/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json', 'mobile/app.json') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        if: ${{ github.event.inputs.qa_mode != 'replay-only' }}
        working-directory: mobile/ios
        run: pod install

      - name: Cache xcodebuild derived data
        if: ${{ github.event.inputs.qa_mode != 'replay-only' }}
        uses: actions/cache@1bd1e96a3ec124d8856201765433a65c7bfa37e8
        id: xcode-cache
        with:
          path: mobile/ios/build
          key: xcode-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json', 'mobile/app.json') }}-${{ hashFiles('mobile/app/**', 'mobile/components/**', 'mobile/lib/**') }}
          restore-keys: |
            xcode-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json', 'mobile/app.json') }}-
            xcode-${{ runner.os }}-

      - name: Resolve simulator
        id: sim
        run: |
          set -euo pipefail
          xcodebuild -version
          xcrun simctl list devices available
          for NAME in "iPhone 16 Pro" "iPhone 15 Pro" "iPhone 15" "iPhone 14"; do
            LINE=$(xcrun simctl list devices available | grep -F "${NAME} (" | head -1 || true)
            if [[ -n "$LINE" ]]; then
              UDID=$(echo "$LINE" | grep -oE '[A-F0-9-]{36}' | head -1)
              echo "device_name=$NAME" >> "$GITHUB_OUTPUT"
              echo "device_udid=$UDID" >> "$GITHUB_OUTPUT"
              echo "Selected simulator: $NAME ($UDID)"
              exit 0
            fi
          done
          echo "No supported iPhone simulator found."
          exit 1

      - name: Boot simulator
        run: |
          set -euo pipefail
          xcrun simctl boot "${{ steps.sim.outputs.device_udid }}" || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.device_udid }}" -b

      - name: Build app (simulator)
        if: ${{ github.event.inputs.qa_mode != 'replay-only' }}
        timeout-minutes: 30
        working-directory: mobile/ios
        run: |
          set -euo pipefail
          JOBS=$(sysctl -n hw.ncpu)
          xcodebuild \
            -workspace Prodify.xcworkspace \
            -scheme Prodify \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device_udid }}" \
            -parallelizeTargets \
            -jobs "$JOBS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=YES \
            DEBUG_INFORMATION_FORMAT=dwarf

      - name: Package iOS simulator app artifact
        if: ${{ github.event.inputs.qa_mode != 'replay-only' }}
        id: package_app
        run: |
          set -euo pipefail
          APP_PATH=$(find mobile/ios/build -path "*/Build/Products/*-iphonesimulator/Prodify.app" -type d | head -1)
          if [[ -z "${APP_PATH:-}" ]]; then
            APP_PATH=$(find mobile/ios/build -name "Prodify.app" -type d | head -1)
          fi
          if [[ -z "${APP_PATH:-}" ]]; then
            echo "Prodify.app not found under mobile/ios/build"
            find mobile/ios/build -name "*.app" || true
            exit 1
          fi
          mkdir -p artifacts/ios-simulator-app
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" artifacts/ios-simulator-app/Prodify.app.zip
          cat > artifacts/ios-simulator-app/metadata.json <<EOF
          {
            "head_sha": "${GITHUB_SHA}",
            "app_path": "${APP_PATH}",
            "created_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "e2e_mode": "${EXPO_PUBLIC_E2E_MODE}",
            "workflow": "${GITHUB_WORKFLOW}"
          }
          EOF
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Packaged $APP_PATH"

      - name: Upload iOS simulator app artifact
        if: ${{ github.event.inputs.qa_mode != 'replay-only' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ios-simulator-app
          path: artifacts/ios-simulator-app/
          retention-days: 7
          if-no-files-found: error

      - name: Download iOS simulator app artifact
        if: ${{ github.event.inputs.qa_mode == 'replay-only' }}
        id: replay_app
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ -z "${{ github.event.inputs.app_artifact_run_id }}" ]]; then
            echo "app_artifact_run_id is required when qa_mode=replay-only"
            exit 1
          fi
          mkdir -p artifacts/replay-app
          gh run download "${{ github.event.inputs.app_artifact_run_id }}" \
            -n ios-simulator-app \
            -D artifacts/replay-app
          ARTIFACT_HEAD_SHA="$(jq -r '.head_sha // empty' artifacts/replay-app/metadata.json)"
          if [[ -n "$ARTIFACT_HEAD_SHA" ]]; then
            if ! bash scripts/qa/test-app-impacting-changes.sh "$ARTIFACT_HEAD_SHA" "$GITHUB_SHA"; then
              echo "Replay-only rejected: app code changed since artifact was built."
              echo "Re-run with qa_mode=build-and-test or push only Maestro/script changes."
              exit 1
            fi
            echo "Artifact from $ARTIFACT_HEAD_SHA is compatible with $GITHUB_SHA"
          else
            echo "Warning: metadata.json missing head_sha; skipping compatibility check"
          fi
          ditto -x -k artifacts/replay-app/Prodify.app.zip artifacts/replay-app
          APP_PATH=$(find artifacts/replay-app -name "Prodify.app" -type d | head -1)
          if [[ -z "${APP_PATH:-}" ]]; then
            echo "Prodify.app not found in downloaded artifact"
            find artifacts/replay-app -maxdepth 4 -print
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Using replay app artifact from run ${{ github.event.inputs.app_artifact_run_id }}: $APP_PATH"

      - name: Install app on booted simulator
        id: install
        run: |
          set -euo pipefail
          xcrun simctl uninstall "${{ steps.sim.outputs.device_udid }}" com.prodify.app || true
          APP_PATH="${{ steps.package_app.outputs.app_path }}"
          if [[ -z "${APP_PATH:-}" ]]; then
            APP_PATH="${{ steps.replay_app.outputs.app_path }}"
          fi
          if [[ -z "${APP_PATH:-}" ]]; then
            echo "Prodify.app path was not resolved"
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Installing $APP_PATH on ${{ steps.sim.outputs.device_udid }}"
          xcrun simctl install "${{ steps.sim.outputs.device_udid }}" "$APP_PATH"

      - name: Cache Maestro CLI
        uses: actions/cache@1bd1e96a3ec124d8856201765433a65c7bfa37e8
        id: maestro-cache
        with:
          path: ~/.maestro
          key: maestro-${{ runner.os }}-${{ env.MAESTRO_VERSION }}
          restore-keys: |
            maestro-${{ runner.os }}-

      - name: Install Maestro CLI
        if: steps.maestro-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSL "https://get.maestro.mobile.dev" -o /tmp/maestro-installer.sh
          echo "${MAESTRO_INSTALLER_SHA256}  /tmp/maestro-installer.sh" | shasum -a 256 -c -
          chmod +x /tmp/maestro-installer.sh
          MAESTRO_VERSION="${MAESTRO_VERSION}" /tmp/maestro-installer.sh

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro CLI
        run: |
          set -euo pipefail
          maestro --version
          maestro --version | grep -Fq "${MAESTRO_VERSION}"

      - name: Run Maestro on iOS simulator
        env:
          SIMULATOR_UDID: ${{ steps.sim.outputs.device_udid }}
          AGENT_DEVICE_REPLAY_TIMEOUT_MS: ${{ contains(github.event.inputs.maestro_flow, 'full_app_test') && '900000' || contains(github.event.inputs.maestro_flow, 'bootstrap_dashboard') && '300000' || '600000' }}
          MAESTRO_DRIVER_STARTUP_TIMEOUT: ${{ github.event.inputs.qa_mode == 'replay-only' && '180000' || '300000' }}
        run: bash scripts/agent-device/run-ios-smoke.sh

      - name: Upload agent-device artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agent-device-artifacts
          path: artifacts/agent-device-ios/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Maestro debug output on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: maestro-debug-output
          path: |
            ~/.maestro/tests/
            artifacts/agent-device-ios/maestro-tests/
            artifacts/agent-device-ios/maestro-output.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload iOS build logs on failure
        if: failure() && github.event.inputs.qa_mode != 'replay-only'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agent-device-xcodebuild-logs
          path: |
            mobile/ios/build/Logs/
          retention-days: 3
          if-no-files-found: ignore
