name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: API base URL for seed + app build
        required: false
        default: https://prodify-api-46b1.onrender.com
      test_email:
        description: E2E login email
        required: false
        default: test@prodify.app
      test_password:
        description: E2E login password
        required: false
        default: Test1234!
      test_username:
        description: E2E register username
        required: false
        default: e2euser
      test_profile:
        description: Maestro flow tier (fast = login/dashboard only)
        required: false
        default: fast
        type: choice
        options:
          - fast
          - full
  pull_request:
    branches:
      - main
      - "release/**"
    paths:
      - "mobile/**"
      - "scripts/seed-e2e-user.sh"
      - ".github/workflows/e2e.yml"
  schedule:
    # Nightly full iOS E2E smoke.
    - cron: "30 2 * * *"

permissions:
  contents: read
  actions: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAESTRO_VERSION: "1.39.13"
  MAESTRO_INSTALLER_SHA256: "40115b628eb491f29d02275bc7e3db5334024ba4fdff7210a334fd3cf4a8f306"
  E2E_API_URL: ${{ github.event.inputs.api_url || 'https://prodify-api-46b1.onrender.com' }}
  E2E_TEST_EMAIL: ${{ github.event.inputs.test_email || 'test@prodify.app' }}
  E2E_TEST_PASSWORD: ${{ github.event.inputs.test_password || 'Test1234!' }}
  E2E_TEST_USERNAME: ${{ github.event.inputs.test_username || 'e2euser' }}
  EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || 'https://prodify-api-46b1.onrender.com' }}
  EXPO_PUBLIC_APP_ENV: development
  EXPO_PUBLIC_ENV: development
  EXPO_PUBLIC_E2E_MODE: "true"
  EXPO_PUBLIC_E2E_TEST_EMAIL: ${{ github.event.inputs.test_email || 'test@prodify.app' }}
  EXPO_PUBLIC_E2E_TEST_PASSWORD: ${{ github.event.inputs.test_password || 'Test1234!' }}
  EXPO_PUBLIC_REVENUECAT_API_KEY: appl_mnYqBJcSBBUEyNRCfULPzxMqpmX
  EXPO_PUBLIC_REVENUECAT_ENTITLEMENT_ID: app_access
  EX_UPDATES_NATIVE_DEBUG: "1"
  SENTRY_DISABLE_AUTO_UPLOAD: "true"
  SENTRY_ALLOW_FAILURE: "true"
  CI: "true"

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    outputs:
      native_hash: ${{ steps.native-hash.outputs.hash }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Hash native sources
        id: native-hash
        run: |
          set -euo pipefail
          HASH=$(
            {
              cat mobile/package-lock.json
              cat mobile/app.json
              cat mobile/app.config.js
              find mobile/app mobile/lib mobile/context mobile/components mobile/features \
                -type f \( -name '*.ts' -o -name '*.tsx' \) 2>/dev/null \
                | LC_ALL=C sort \
                | xargs cat 2>/dev/null || true
            } | shasum -a 256 | cut -c1-16
          )
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Bundle cache key: $HASH"

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Configure fast standalone iOS QA build
        working-directory: mobile
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const path = "package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          pkg.expo = pkg.expo || {};
          pkg.expo.autolinking = pkg.expo.autolinking || {};
          pkg.expo.autolinking.ios = pkg.expo.autolinking.ios || {};
          pkg.expo.autolinking.ios.exclude = [
            "expo-dev-client",
            "expo-dev-launcher",
            "expo-dev-menu",
            "expo-dev-menu-interface"
          ];
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          NODE

      - name: Prebuild iOS
        working-directory: mobile
        run: |
          set -euo pipefail
          cat > .env <<EOF
          EXPO_PUBLIC_E2E_TEST_EMAIL=${E2E_TEST_EMAIL}
          EXPO_PUBLIC_E2E_TEST_PASSWORD=${E2E_TEST_PASSWORD}
          EOF
          npx expo prebuild --platform ios --clean

      - name: Force bundled JS for Debug simulator build
        working-directory: mobile
        run: |
          set -euo pipefail
          sed -i '' 's/SKIP_BUNDLING/FORCE_BUNDLING/g' ios/Prodify.xcodeproj/project.pbxproj

      - name: Cache CocoaPods
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        id: pods-cache
        with:
          path: mobile/ios/Pods
          key: e2e-pods-${{ steps.native-hash.outputs.hash }}
          restore-keys: |
            e2e-pods-

      - name: Install CocoaPods
        if: steps.pods-cache.outputs.cache-hit != 'true'
        working-directory: mobile/ios
        run: pod install

      - name: Cache xcodebuild output
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        id: xcode-cache
        with:
          path: mobile/ios/build
          key: e2e-xcode-${{ steps.native-hash.outputs.hash }}
          restore-keys: |
            e2e-xcode-

      - name: Build app (simulator)
        if: steps.xcode-cache.outputs.cache-hit != 'true'
        working-directory: mobile/ios
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace Prodify.xcworkspace \
            -scheme Prodify \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Resolve Prodify.app path
        id: app
        run: |
          set -euo pipefail
          APP_PATH=$(find mobile/ios/build -path "*/Build/Products/*-iphonesimulator/Prodify.app" -type d | head -1)
          if [[ -z "${APP_PATH:-}" ]]; then
            APP_PATH=$(find mobile/ios/build -name "Prodify.app" -type d | head -1)
          fi
          if [[ -z "${APP_PATH:-}" ]]; then
            echo "Prodify.app not found under mobile/ios/build"
            find mobile/ios/build -name "*.app" || true
            exit 1
          fi
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Packaging $APP_PATH"

      - name: Zip simulator app for artifact upload
        id: app-zip
        run: |
          set -euo pipefail
          APP_PATH="${{ steps.app.outputs.path }}"
          ZIP_PATH="${{ runner.temp }}/Prodify.app.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prodify-ios-simulator
          path: ${{ steps.app-zip.outputs.zip_path }}
          retention-days: 3
          if-no-files-found: error

  maestro-ios:
    runs-on: macos-15
    needs: build-ios
    timeout-minutes: ${{ github.event_name == 'schedule' && 60 || (github.event.inputs.test_profile == 'full' && 60 || 30) }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Select Maestro flow
        id: flow
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            FLOW="maestro/flows/smoke_test.yaml"
          elif [[ "${{ github.event.inputs.test_profile }}" == "full" ]]; then
            FLOW="maestro/flows/smoke_test.yaml"
          else
            FLOW="maestro/flows/e2e_login_smoke.yaml"
          fi
          echo "path=$FLOW" >> "$GITHUB_OUTPUT"
          echo "Maestro flow: $FLOW"

      - name: Download iOS simulator app
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: prodify-ios-simulator
          path: artifacts

      - name: Unzip simulator app bundle
        id: app-bundle
        run: |
          set -euo pipefail
          ZIP_PATH=$(find artifacts -name "Prodify.app.zip" -type f | head -1)
          if [[ -z "${ZIP_PATH:-}" ]]; then
            echo "Prodify.app.zip not found in downloaded artifact"
            find artifacts || true
            exit 1
          fi
          unzip -q "$ZIP_PATH" -d artifacts
          APP_PATH=$(find artifacts -name "Prodify.app" -type d | head -1)
          if [[ -z "${APP_PATH:-}" ]]; then
            echo "Prodify.app not found after unzip"
            find artifacts || true
            exit 1
          fi
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Unpacked $APP_PATH"

      - name: Cache Maestro CLI
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        id: maestro-cache
        with:
          path: ~/.maestro
          key: maestro-${{ runner.os }}-${{ env.MAESTRO_VERSION }}
          restore-keys: |
            maestro-${{ runner.os }}-

      - name: Install Maestro
        if: steps.maestro-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSL "https://get.maestro.mobile.dev" -o /tmp/maestro-installer.sh
          echo "${MAESTRO_INSTALLER_SHA256}  /tmp/maestro-installer.sh" | shasum -a 256 -c -
          chmod +x /tmp/maestro-installer.sh
          MAESTRO_VERSION="${MAESTRO_VERSION}" /tmp/maestro-installer.sh

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro CLI
        run: |
          set -euo pipefail
          maestro --version
          maestro --version | grep -Fq "${MAESTRO_VERSION}"

      - name: Resolve simulator
        id: sim
        run: |
          set -euo pipefail
          xcodebuild -version
          xcrun simctl list devices available
          for NAME in "iPhone 16 Pro" "iPhone 15 Pro" "iPhone 15" "iPhone 14"; do
            LINE=$(xcrun simctl list devices available | grep -F "${NAME} (" | head -1 || true)
            if [[ -n "$LINE" ]]; then
              UDID=$(echo "$LINE" | grep -oE '[A-F0-9-]{36}' | head -1)
              echo "device_name=$NAME" >> "$GITHUB_OUTPUT"
              echo "device_udid=$UDID" >> "$GITHUB_OUTPUT"
              echo "Selected simulator: $NAME ($UDID)"
              exit 0
            fi
          done
          echo "No supported iPhone simulator found."
          exit 1

      - name: Boot simulator
        run: |
          set -euo pipefail
          xcrun simctl boot "${{ steps.sim.outputs.device_udid }}" || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.device_udid }}" -b
          sleep 5

      - name: Pre-approve prodify deep links on simulator
        run: |
          set -euo pipefail
          UDID="${{ steps.sim.outputs.device_udid }}"
          PLIST="$HOME/Library/Developer/CoreSimulator/Devices/${UDID}/data/Library/Preferences/com.apple.launchservices.schemeapproval.plist"
          mkdir -p "$(dirname "$PLIST")"
          if [[ ! -f "$PLIST" ]]; then
            /usr/libexec/PlistBuddy -c "Add :com.apple.CoreSimulator.CoreSimulatorBridge dict" "$PLIST"
          fi
          /usr/libexec/PlistBuddy -c "Delete :com.apple.CoreSimulator.CoreSimulatorBridge:prodify" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :com.apple.CoreSimulator.CoreSimulatorBridge:prodify string com.prodify.app" "$PLIST"

      - name: Install app on booted simulator
        run: |
          set -euo pipefail
          xcrun simctl uninstall "${{ steps.sim.outputs.device_udid }}" com.prodify.app || true
          APP_PATH="${{ steps.app-bundle.outputs.path }}"
          echo "Installing $APP_PATH on ${{ steps.sim.outputs.device_udid }}"
          xcrun simctl install "${{ steps.sim.outputs.device_udid }}" "$APP_PATH"

      - name: Warm API and reset E2E account
        run: bash scripts/seed-e2e-user.sh

      - name: Run Maestro
        working-directory: mobile
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: "120000"
        run: |
          set -euo pipefail
          maestro --device "${{ steps.sim.outputs.device_udid }}" test \
            -e "TEST_EMAIL=${E2E_TEST_EMAIL}" \
            -e "TEST_PASSWORD=${E2E_TEST_PASSWORD}" \
            "${{ steps.flow.outputs.path }}"

      - name: Upload Maestro screenshots / reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: maestro-artifacts
          path: ~/.maestro/tests/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Maestro logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: maestro-logs
          path: ~/.maestro/logs/
          retention-days: 7
          if-no-files-found: ignore
