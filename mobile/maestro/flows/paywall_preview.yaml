appId: com.prodify.app
---
- launchApp:
    clearState: true
- runFlow:
    file: common/e2e_login_dashboard.yaml
- openLink: "prodify://paywall"
- runFlow: common/confirm_deep_link.yaml
- extendedWaitUntil:
    visible: "App access"
    timeout: 20000
- assertVisible: "BEST VALUE.*6 months.*CHF 49.99"
- assertVisible: "1 week.*CHF 10.00"
- assertVisible: "Restore purchases"
