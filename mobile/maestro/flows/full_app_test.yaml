appId: com.prodify.app
env:
  TEST_EMAIL: test@prodify.app
  TEST_PASSWORD: Test1234!
---
# --- Onboarding + existing-account login ---
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow:
    file: onboarding_to_login.yaml
- runFlow:
    file: common/e2e_login_dashboard.yaml

# --- Core session flow (smoke baseline) ---
- tapOn: "START SESSION"
- assertVisible: "New Session"
- tapOn: "Beat Making"
- tapOn: "START SESSION"
- assertVisible: "STOP SESSION"
- waitForAnimationToEnd
- tapOn: "STOP SESSION"
- tapOn: "End session"
- assertVisible: "Session logged"
- tapOn: "Back to dashboard"
- assertVisible: "START SESSION"

# --- Tab navigation ---
- tapOn: "Stats"
- assertVisible: "Your stats"
- tapOn: "Friends"
- assertVisible: "Friends"
- tapOn: "Profile"
- assertVisible: "Profile"
- tapOn: "Dashboard"
- extendedWaitUntil:
    visible:
      id: "dashboard-start-session"
    timeout: 30000

# --- Secondary screens (deep links + in-app navigation) ---
- openLink: prodify://streak/history
- runFlow:
    file: common/confirm_deep_link.yaml
- extendedWaitUntil:
    visible: "Streak history"
    timeout: 20000
- back

- openLink: prodify://notifications
- runFlow:
    file: common/confirm_deep_link.yaml
- extendedWaitUntil:
    visible: "Notifications"
    timeout: 20000
- assertVisible: "Preferences"
- tapOn: "‹ Back"

- openLink: prodify://session-trash
- runFlow:
    file: common/confirm_deep_link.yaml
- extendedWaitUntil:
    visible: "Session trash"
    timeout: 20000
- back

- openLink: prodify://session/setup
- runFlow:
    file: common/confirm_deep_link.yaml
- extendedWaitUntil:
    visible: "New Session"
    timeout: 20000
- back

# --- Stats: weekly recap ---
- tapOn: "Stats"
- extendedWaitUntil:
    visible: "Your stats"
    timeout: 20000
- scrollUntilVisible:
    element: "Open weekly recap"
    direction: DOWN
    timeout: 30000
- tapOn: "Open weekly recap"
- extendedWaitUntil:
    visible: "Weekly recap"
    timeout: 20000
- tapOn: "Close"

# --- Progression overview ---
- openLink: prodify://progression-overview
- runFlow:
    file: common/confirm_deep_link.yaml
- extendedWaitUntil:
    visible: "Your rank"
    timeout: 20000
- assertVisible: "All ranks"
- tapOn: "Back to dashboard"

# --- Profile: public profile + legal ---
- tapOn: "Profile"
- extendedWaitUntil:
    visible: "Profile"
    timeout: 20000
- runFlow:
    when:
      visible: "View public profile"
    file: common/view_public_profile.yaml
- scrollUntilVisible:
    element: "Privacy"
    direction: DOWN
    timeout: 30000
- tapOn: "Notifications"
- extendedWaitUntil:
    visible: "Notifications"
    timeout: 20000
- tapOn: "‹ Back"
- tapOn: "Privacy"
- extendedWaitUntil:
    visible: "Privacy policy"
    timeout: 15000
- tapOn: "Back"
- tapOn: "Terms of use"
- extendedWaitUntil:
    visible: "Terms of use"
    timeout: 15000
- tapOn: "Back"

# --- Finish on dashboard ---
- tapOn: "Dashboard"
- assertVisible: "START SESSION"
