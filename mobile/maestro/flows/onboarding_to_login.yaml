appId: com.prodify.app
---
- tapOn: "Skip"
- assertVisible: "How long have you been producing?"
- tapOn: "Skip"
- assertVisible: "Weekly session target"
- tapOn: "Skip"
- assertVisible: "Your Prodify plan"
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Premium"
    timeout: 20000
- openLink: prodify://login
- runFlow:
    file: common/confirm_deep_link.yaml
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 20000
