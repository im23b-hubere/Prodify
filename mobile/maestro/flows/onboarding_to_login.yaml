appId: com.prodify.app
---
- tapOn:
    point: "70%,55%"
- extendedWaitUntil:
    visible:
      id: "onboarding-intro"
    timeout: 20000
- tapOn:
    point: "90%,10%"
- assertVisible:
    id: "onboarding-experience"
- tapOn:
    point: "90%,10%"
- assertVisible:
    id: "onboarding-weekly-goal"
- tapOn:
    point: "90%,10%"
- assertVisible:
    id: "onboarding-plan"
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Let's get started"
    timeout: 20000
- assertVisible: "Create account"
