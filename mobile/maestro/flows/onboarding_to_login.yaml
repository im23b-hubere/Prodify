appId: com.prodify.app
---
- runFlow: common/confirm_deep_link.yaml
- extendedWaitUntil:
    visible: "Welcome to Prodify"
    timeout: 20000
- tapOn:
    point: "90%,10%"
- assertVisible: "How long have you been producing?"
- tapOn:
    point: "90%,7%"
- assertVisible: "Weekly session target"
- tapOn:
    point: "90%,7%"
- assertVisible: "Your Prodify plan"
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Let's get started"
    timeout: 20000
- assertVisible: "Create account"
