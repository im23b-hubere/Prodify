appId: com.prodify.app
---
- assertVisible: "Welcome back"
- tapOn: "Email"
- inputText: ${TEST_EMAIL}
- tapOn: "Password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign in"
- tapOn:
    text: "Skip for now \\(dev\\)"
    optional: true
- extendedWaitUntil:
    visible:
      id: "dashboard-start-session"
    timeout: 60000
