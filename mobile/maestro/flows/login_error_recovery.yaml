appId: com.prodify.app
env:
  TEST_EMAIL: test@prodify.app
  TEST_PASSWORD: Test1234!
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 90000
- tapOn:
    id: "email-input"
- eraseText: 80
- inputText: "invalid@prodify.app"
- tapOn:
    id: "password-input"
- eraseText: 80
- inputText: "DefinitelyWrong123!"
- tapOn:
    id: "sign-in-button"
- extendedWaitUntil:
    visible:
      id: "login-error"
    timeout: 90000
- assertVisible:
    id: "sign-in-button"
- assertNotVisible:
    id: "login-connection-hint"
- tapOn:
    id: "email-input"
- eraseText: 80
- inputText: "${TEST_EMAIL}"
- tapOn:
    id: "password-input"
- eraseText: 80
- inputText: "${TEST_PASSWORD}"
- tapOn:
    id: "sign-in-button"
- extendedWaitUntil:
    visible:
      id: "dashboard-start-session"
    timeout: 180000
