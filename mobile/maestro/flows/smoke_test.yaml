# Prodify smoke flow — requires API reachable from the simulator (e.g. EXPO_PUBLIC_API_URL).
# Seed a test user once (username required, min 2 chars):
#   curl -sS -X POST "https://prodify-api-46b1.onrender.com/auth/register" \
#     -H "Content-Type: application/json" \
#     -d '{"email":"test@prodify.app","password":"Test1234!","username":"e2euser"}'
#
# Override credentials when running Maestro:
#   maestro test -e TEST_EMAIL=user@x.com -e TEST_PASSWORD='secret' maestro/flows/smoke_test.yaml

appId: com.prodify.app
env:
  TEST_EMAIL: test@prodify.app
  TEST_PASSWORD: Test1234!
---
- launchApp
- runFlow:
    when:
      visible: "Welcome to Prodify"
    file: onboarding_then_login.yaml
- runFlow:
    when:
      visible: "Welcome back"
    file: login_with_credentials.yaml

# --- Dashboard → session (aligned with en.json copy) ---
- assertVisible: "Start session"
- tapOn: "Start session"
- assertVisible: "New Session"
- tapOn: "Beat Making"
- tapOn: "START SESSION"
- assertVisible: "STOP SESSION"
- waitForAnimationToEnd

# End session (confirmation alert uses sentence case)
- tapOn: "STOP SESSION"
- tapOn: "End session"
- assertVisible: "Session complete"

# Tabs
- tapOn: "Stats"
- assertVisible: "Your stats"

- tapOn: "Friends"
- assertVisible: "Friends"

- tapOn: "Profile"
- assertVisible: "Profile"

- tapOn: "Dashboard"
- assertVisible: "Dashboard"
