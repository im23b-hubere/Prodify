appId: com.prodify.app
env:
  TEST_EMAIL: test@prodify.app
  TEST_PASSWORD: Test1234!
---
- launchApp:
    clearState: true
- runFlow:
    file: common/e2e_bootstrap_dashboard.yaml
- runFlow:
    file: common/dismiss_overlays.yaml
- tapOn: "START SESSION"
- assertVisible: "New Session"
- tapOn: "Beat Making"
- tapOn: "START SESSION"
- assertVisible: "STOP SESSION"
- waitForAnimationToEnd
- tapOn: "STOP SESSION"
- tapOn: "End session"
- assertVisible: "Session logged"
- tapOn: "Back to dashboard"
- assertVisible: "START SESSION"
- tapOn: "Stats"
- assertVisible: "Your stats"
- tapOn: "Friends"
- assertVisible: "Friends"
- tapOn: "Profile"
- assertVisible: "Profile"
- tapOn: "Dashboard"
- extendedWaitUntil:
    visible:
      id: "dashboard-start-session"
    timeout: 30000
