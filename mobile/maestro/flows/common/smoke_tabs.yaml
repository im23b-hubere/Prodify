      id: friends-screen
    timeout: 90000
- tapOn:
    id: tab-profile
- extendedWaitUntil:
    visible:
      id: profile-screen
    timeout: 90000
- tapOn:
    id: tab-dashboard
- extendedWaitUntil:
    visible:
      id: dashboard-studio-hud
    timeout: 90000
