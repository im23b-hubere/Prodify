appId: com.prodify.app
---
# Leftover active sessions hide dashboard-start-session until stopped.
- runFlow:
    when:
      visible:
        id: dashboard-stop-session
    commands:
      - tapOn:
          id: dashboard-stop-session
      - tapOn: "End session"
      - extendedWaitUntil:
          visible:
            id: session-complete-screen
          timeout: 90000
      - tapOn:
          id: session-complete-back
      - extendedWaitUntil:
          visible:
            id: dashboard-start-session
          timeout: 60000
