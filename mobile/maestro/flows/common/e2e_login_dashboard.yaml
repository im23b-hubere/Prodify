appId: com.prodify.app
---
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 90000
- extendedWaitUntil:
    visible:
      id: "login-e2e-ready"
    timeout: 30000
- tapOn:
    id: "sign-in-button"
- extendedWaitUntil:
    visible:
      id: "dashboard-studio-hud"
    timeout: 180000
- tapOn:
    text: "Skip for now \\(dev\\)"
    optional: true
- runFlow:
    file: dismiss_overlays.yaml
- runFlow:
    file: recover_dashboard_idle.yaml
- extendedWaitUntil:
    visible:
      id: "dashboard-start-session"
    timeout: 90000
- assertVisible: "START SESSION"
