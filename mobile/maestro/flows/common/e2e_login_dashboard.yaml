appId: com.prodify.app
---
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 90000
- tapOn: "Email"
- inputText: ${TEST_EMAIL}
- tapOn: "Password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign in"
- tapOn:
    text: "Skip for now \\(dev\\)"
    optional: true
- runFlow:
    file: dismiss_overlays.yaml
- extendedWaitUntil:
    visible:
      id: "dashboard-start-session"
    timeout: 120000
- assertVisible: "START SESSION"
