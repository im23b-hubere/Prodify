appId: com.prodify.app
---
# First-run dashboard tutorial (SecureStore cleared by launchApp clearState).
# A conditional flow is bounded; Maestro's optional text lookup can remain
# RUNNING indefinitely on iOS when the overlay is not mounted.
- runFlow:
    when:
      visible:
        id: "tutorial-got-it"
    commands:
      - tapOn:
          id: "tutorial-got-it"
